services:
  tei:
    container_name: tei
    restart: unless-stopped
    image: cognee-onprem-tei:latest
    ports:
      - "8080:80"
    environment:
      - MODEL_ID=${EMBEDDING_MODEL:-aisingapore/SEA-LION-E5-Embedding-600M}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - MAX_BATCH_SIZE=64
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4GB
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
