services:
  tei:
    container_name: tei
    restart: unless-stopped
    image: cognee-onprem-tei:latest
    build:
      context: ./embedding-server
    runtime: nvidia
    environment:
      - MODEL_ID=${EMBEDDING_MODEL:-aisingapore/SEA-LION-E5-Embedding-600M}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - MAX_BATCH_SIZE=64
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8080:80"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4GB
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  hf_cache:
